<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Customer Login</title>

<style>

body{

margin:0;

font-family:sans-serif;

background:#0f172a;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

color:white;

}


.card{

background:#1e293b;

padding:25px;

border-radius:12px;

width:90%;

max-width:400px;

text-align:center;

box-shadow:0 0 20px rgba(0,0,0,0.4);

}


h2{

margin-top:0;

}


input,select{

width:100%;

padding:12px;

margin-top:10px;

border-radius:8px;

border:none;

}


button{

width:100%;

padding:12px;

margin-top:12px;

border:none;

border-radius:8px;

background:#22c55e;

color:white;

font-size:15px;

cursor:pointer;

}


img{

width:100%;

margin-top:10px;

border-radius:8px;

}


#profilePage,#dashboard{

display:none;

}


</style>

</head>


<body>



<div class="card" id="loginPage">


<h2>Customer Login</h2>


<input placeholder="Username" id="username">


<input type="password" placeholder="Password" id="password">


<button onclick="login()">Login</button>


<p style="font-size:13px;opacity:0.7">

Demo login:

user / 1234

</p>


</div>



<div class="card" id="profilePage">


<h2>Complete Profile</h2>


<input placeholder="Full Name" id="name">


<select id="gender">

<option>Gender</option>

<option>Male</option>

<option>Female</option>

</select>


<input placeholder="Age" id="age">


<input type="file" id="photo">


<button onclick="saveProfile()">Submit</button>


</div>



<div class="card" id="dashboard">


<h2>Welcome</h2>


<div id="userData"></div>


<img id="profilePic">


<hr>


<h3>Services</h3>


Photo Editing – ₹50<br>

Poster Design – ₹80<br>

Video Editing – ₹150


<br><br>


<a href="https://wa.me/918056760167">

<button>Contact WhatsApp</button>

</a>


<br>


UPI:

8056760167@superyes


</div>



<script>


function login(){


let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;


if(user=="user" && pass=="1234"){


document.getElementById("loginPage").style.display="none";


document.getElementById("profilePage").style.display="block";


}


else{


alert("Wrong login");


}


}



function saveProfile(){


let name=document.getElementById("name").value;

let gender=document.getElementById("gender").value;

let age=document.getElementById("age").value;


document.getElementById("profilePage").style.display="none";


document.getElementById("dashboard").style.display="block";


document.getElementById("userData").innerHTML=

name+"<br>"+gender+"<br>"+age;


let file=document.getElementById("photo").files[0];


let reader=new FileReader();


reader.onload=function(e){

document.getElementById("profilePic").src=e.target.result;

}


reader.readAsDataURL(file);


}


</script>



</body>

</html>
